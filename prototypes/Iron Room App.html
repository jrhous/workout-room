<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1024, initial-scale=1, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>The Iron Room — Wall iPad</title>
<link rel="stylesheet" href="app/styles.css" />
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="app/workouts.js"></script>
  <script src="app/store.js"></script>
  <script type="text/babel" src="app/components.jsx"></script>
  <script type="text/babel" src="app/screens.jsx"></script>
  <script type="text/babel" src="app/app.jsx"></script>

  <script>
    // Auto-fit to viewport on smaller-than-1024 screens
    function fit() {
      const app = document.querySelector('.app');
      if (!app) { requestAnimationFrame(fit); return; }
      const stage = document.querySelector('.stage');
      const sx = stage.clientWidth / 1024;
      const sy = stage.clientHeight / 1366;
      const s = Math.min(1, sx, sy);
      app.style.transform = `scale(${s})`;
    }
    window.addEventListener('resize', fit);
    setTimeout(fit, 50);
    setTimeout(fit, 500);
  </script>
</body>
</html>
